<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <title>Lazada vouchers menu clone</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <img src="Screenshot_20260419-121514.png" width="100%"/>
  
  <div class="box">
    <div class="above-text">
      <h3>Biggest Savings</h3>
      <button type="submit">More vouchers ></button>
    </div>
    
    <div class="voucher-box">
      
      <div class="voucher" id="first-voucher">
        <h4>4% OFF</h4>
        <p>Lazada voucher</p>
      </div>
      
      <div class="voucher" id="second-voucher">
        <h4>RM6.00</h4>
        <p>Free shipping</p>
      </div>
      
      <div class="voucher">
        <img src="Untitled66_20260419121925.png"
        width="100px"
        height="100px"
        />
      </div>
      
    </div>
  </div>
  
  
  
  <!-- Project -->
  <script src="main.js"></script>
</body>
</html>
